<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love Gaya ❤️</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:#cfc4ff;
  color:#222;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
}

.version-tag{
  position:fixed;
  top:8px;
  left:10px;
  font-size:10px;
  color:rgba(0,0,0,0.4);
  z-index:9999;
  user-select:none;
  pointer-events:none;
}

.section{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  opacity:0;
  transition:opacity 1.2s ease;
}

.section.active{opacity:1}

.media-grid{
  width:100%;
  max-width:1500px;
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:22px;
}

.media-card{
  width:100%;
  height:78vh;
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.media-card img,
.media-card video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#fff;
}

.error{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  color:#ff4d4d;
  background:rgba(255,255,255,0.9);
  font-size:14px;
}

.media-card.failed .error{
  display:flex;
}

@media (max-width:950px){
  .media-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="version-tag">v1.1.0</div>

<script>
const portraitPhotos = [
  "pp1","pp2","pp3","pp4","pp5","pp6","pp7","pp8","pp9","pp10",
  "pp11","pp12","pp13","pp14","pp15","pp16","pp17","pp18","pp19","pp20",
  "pp21","pp22","pp23","pp24","pp25","pp26","pp27","pp28","pp29","pp30",
  "pp31","pp32","pp33","pp34","pp35","pp36"
];

const landscapePhotos = [
  "lp1","lp2","lp3","lp4","lp5","lp6","lp7","lp8","lp9","lp10","lp11",
  "lp12","lp13","lp14","lp15","lp16","lp17","lp18","lp19","lp20","lp21","lp22","lp23"
];

const portraitVideos = [
  "pv1","pv2","pv3","pv4","pv5","pv6","pv7","pv8","pv9","pv10",
  "pv11","pv12","pv13","pv14","pv15","pv16","pv17","pv18","pv19"
];

const landscapeVideos = ["lv1","lv2","lv3","lv4","lv5"];

const imageExts = [".jpg",".jpeg",".JPG",".JPEG"];
const videoExts = [".mp4",".MP4",".mov",".MOV"];

function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function loadImage(img, base){
  let i = 0;
  function tryNext(){
    if(i >= imageExts.length){
      img.style.display="none";
      return;
    }
    img.src = base + imageExts[i++];
  }
  img.onerror = tryNext;
  tryNext();
}

function setupVideo(video, card, base){
  let i = 0;
  function tryNext(){
    if(i >= videoExts.length){
      card.classList.add("failed");
      return;
    }
    video.src = base + videoExts[i++];
    video.load();
  }
  video.onerror = tryNext;
  tryNext();
}

const photos = shuffle([
  ...portraitPhotos.map(x => ({type:"image", base:x})),
  ...landscapePhotos.map(x => ({type:"image", base:x}))
]);

const videos = shuffle([
  ...portraitVideos.map(x => ({type:"video", base:x})),
  ...landscapeVideos.map(x => ({type:"video", base:x}))
]);

function buildSections(){
  const sections = [];
  let p = 0, v = 0;

  while(p < photos.length || v < videos.length){
    const section = [];

    if(v < videos.length) section.push(videos[v++]);

    while(section.length < 3 && p < photos.length){
      section.push(photos[p++]);
    }

    while(section.length < 3 && v < videos.length && !section.some(x=>x.type==="video")){
      section.push(videos[v++]);
    }

    sections.push(shuffle(section));
  }

  return sections;
}

const groups = buildSections();

groups.forEach(group=>{
  const section = document.createElement("section");
  section.className = "section";

  const grid = document.createElement("div");
  grid.className = "media-grid";

  group.forEach(item=>{
    const card = document.createElement("div");
    card.className = "media-card";

    if(item.type==="image"){
      const img = document.createElement("img");
      loadImage(img,item.base);
      card.appendChild(img);
    } else {
      const video = document.createElement("video");
      video.muted = true;
      video.loop = true;
      video.playsInline = true;
      video.controls = true;
      video.preload = "metadata";

      const err = document.createElement("div");
      err.className="error";
      err.textContent=item.base+" failed to load";

      setupVideo(video,card,item.base);

      card.appendChild(video);
      card.appendChild(err);
    }

    grid.appendChild(card);
  });

  section.appendChild(grid);
  document.body.appendChild(section);
});

const sections = [...document.querySelectorAll(".section")];

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    const vids = entry.target.querySelectorAll("video");

    if(entry.isIntersecting){
      entry.target.classList.add("active");
      vids.forEach(v=>v.play().catch(()=>{}));
    } else {
      entry.target.classList.remove("active");
      vids.forEach(v=>{
        v.pause();
        v.currentTime=0;
      });
    }
  });
},{threshold:0.7});

sections.forEach(s=>observer.observe(s));

let index = 0;
let locked = false;

function go(i){
  index = Math.max(0,Math.min(i,sections.length-1));
  locked = true;

  sections[index].scrollIntoView({behavior:"smooth"});

  setTimeout(()=>locked=false,900);
}

window.addEventListener("wheel",e=>{
  e.preventDefault();
  if(locked) return;

  if(e.deltaY>0) go(index+1);
  else go(index-1);
},{passive:false});

window.addEventListener("keydown",e=>{
  if(locked) return;

  if(e.key==="ArrowDown"||e.key===" "){
    e.preventDefault();
    go(index+1);
  }
  if(e.key==="ArrowUp"){
    e.preventDefault();
    go(index-1);
  }
});

let startY=0;

window.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});

window.addEventListener("touchend",e=>{
  if(locked) return;

  const diff=startY-e.changedTouches[0].clientY;

  if(Math.abs(diff)<50) return;

  if(diff>0) go(index+1);
  else go(index-1);
});
</script>

</body>
</html>
