<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love Gaya ❤️</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
}

.version-tag{
  position:fixed;
  top:8px;
  left:10px;
  font-size:10px;
  color:rgba(255,255,255,0.35);
  z-index:9999;
}

body.final-cursor,
body.final-cursor *{
  cursor:url("sponge.png") 16 16, auto;
}

.section{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  opacity:0;
  transition:opacity 1.2s ease;
}

.section.active{opacity:1}

.media-grid{
  width:100%;
  max-width:1500px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:22px;
}

.media-card{
  width:100%;
  height:78vh;
  background:#111;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 24px rgba(255,255,255,0.14);
  display:flex;
  align-items:center;
  justify-content:center;
}

.media-card img,
.media-card video{
  width:100%;
  height:100%;
  object-fit:contain;
}

.final-section{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#cfc4ff;
}

.final-dog{
  max-width:90%;
  max-height:80vh;
  user-select:none;
}

.letter-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  visibility:hidden;
  transition:0.4s;
  z-index:10000;
}

.letter-overlay.open{
  opacity:1;
  visibility:visible;
}

.letter-image{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.letter-close{
  position:absolute;
  top:20px;
  right:20px;
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#fff;
  color:#000;
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="version-tag">v1.2.1</div>
<audio id="belly-audio" src="belly.mp3"></audio>

<script>
// ---------- MEDIA SETUP ----------
const portraitPhotos=[...Array(36)].map((_,i)=>"pp"+(i+1));
const landscapePhotos=[...Array(23)].map((_,i)=>"lp"+(i+1));
const portraitVideos=[...Array(19)].map((_,i)=>"pv"+(i+1));
const landscapeVideos=["lv1","lv2","lv3","lv4","lv5"];

const imageExts=[".jpg",".jpeg",".JPG",".JPEG"];
const videoExts=[".mp4",".MP4",".mov",".MOV"];

function shuffle(array){
  const arr=[...array];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function loadImage(img,base){
  let i=0;
  function next(){
    if(i>=imageExts.length){
      img.style.display="none";
      return;
    }
    img.src=base+imageExts[i++];
  }
  img.onerror=next;
  next();
}

function setupVideo(video,base){
  let i=0;
  function next(){
    if(i>=videoExts.length)return;
    video.src=base+videoExts[i++];
    video.load();
  }
  video.onerror=next;
  next();
}

const photos=shuffle([
  ...portraitPhotos.map(x=>({t:"i",b:x})),
  ...landscapePhotos.map(x=>({t:"i",b:x}))
]);

const videos=shuffle([
  ...portraitVideos.map(x=>({t:"v",b:x})),
  ...landscapeVideos.map(x=>({t:"v",b:x}))
]);

function buildSections(){
  const out=[];
  let p=0,v=0;

  while(p<photos.length||v<videos.length){
    const section=[];

    if(v<videos.length) section.push(videos[v++]);

    while(section.length<3&&p<photos.length){
      section.push(photos[p++]);
    }

    while(section.length<3&&v<videos.length&&!section.some(x=>x.t==="v")){
      section.push(videos[v++]);
    }

    while(section.length<3&&p<photos.length){
      section.push(photos[p++]);
    }

    while(section.length<3&&v<videos.length){
      section.push(videos[v++]);
    }

    out.push(shuffle(section));
  }

  return out;
}

buildSections().forEach(group=>{
  const sec=document.createElement("section");
  sec.className="section";

  const grid=document.createElement("div");
  grid.className="media-grid";

  group.forEach(item=>{
    const card=document.createElement("div");
    card.className="media-card";

    if(item.t==="i"){
      const img=document.createElement("img");
      loadImage(img,item.b);
      card.appendChild(img);
    }else{
      const video=document.createElement("video");
      video.muted=true;
      video.loop=true;
      video.controls=true;
      video.playsInline=true;
      video.preload="metadata";
      setupVideo(video,item.b);
      card.appendChild(video);
    }

    grid.appendChild(card);
  });

  sec.appendChild(grid);
  document.body.appendChild(sec);
});

// ---------- FINAL SECTION ----------
const final=document.createElement("section");
final.className="final-section";

const dog=document.createElement("img");
dog.src="pibble.png";
dog.className="final-dog";
dog.alt="pibble";

final.appendChild(dog);
document.body.appendChild(final);

// ---------- LETTER ----------
const overlay=document.createElement("div");
overlay.className="letter-overlay";

const letter=document.createElement("img");
letter.src="letter.jpg";
letter.className="letter-image";
letter.alt="letter";

const close=document.createElement("button");
close.className="letter-close";
close.innerHTML="&times;";
close.setAttribute("aria-label","Close letter");

overlay.appendChild(letter);
overlay.appendChild(close);
document.body.appendChild(overlay);

// ---------- AUDIO ----------
const audio=document.getElementById("belly-audio");
audio.volume=1;
audio.preload="auto";

let playing=false;
let rub=0;
let letterOpen=false;
let audioUnlocked=false;

function unlockAudio(){
  if(audioUnlocked) return;

  audio.muted = true;
  audio.currentTime = 0;

  const p = audio.play();
  if(p){
    p.then(() => {
      audio.pause();
      audio.currentTime = 0;
      audio.muted = false;
      audioUnlocked = true;
    }).catch(() => {});
  }
}

window.addEventListener("pointerdown", unlockAudio, { once:true });
window.addEventListener("touchstart", unlockAudio, { once:true });
window.addEventListener("keydown", unlockAudio, { once:true });

// ---------- INTERSECTION / FADE / PLAY ----------
const sections=[...document.querySelectorAll("section")];

const obs=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    const vids=entry.target.querySelectorAll("video");

    if(entry.isIntersecting){
      entry.target.classList.add("active");

      vids.forEach(v=>{
        const p=v.play();
        if(p) p.catch(()=>{});
      });

      if(entry.target===final){
        document.body.classList.add("final-cursor");

        if(!playing && !letterOpen){
          playing=true;
          audio.currentTime=0;

          const p=audio.play();
          if(p){
            p.catch(()=>{
              setTimeout(()=>{
                if(final.classList.contains("active") && !letterOpen){
                  audio.currentTime=0;
                  const retry=audio.play();
                  if(retry) retry.catch(()=>{});
                }
              },150);
            });
          }
        }
      }else{
        document.body.classList.remove("final-cursor");
      }
    }else{
      entry.target.classList.remove("active");

      vids.forEach(v=>{
        v.pause();
        v.currentTime=0;
      });

      if(entry.target===final){
        document.body.classList.remove("final-cursor");
        audio.pause();
        audio.currentTime=0;
        playing=false;
      }
    }
  });
},{threshold:0.72});

sections.forEach(s=>obs.observe(s));

// ---------- SNAP / SCROLL LOCK ----------
let currentSectionIndex=0;
let isScrolling=false;
let touchStartY=0;
const scrollLockMs=900;

function goToSection(index){
  const clamped=Math.max(0,Math.min(index,sections.length-1));
  currentSectionIndex=clamped;
  isScrolling=true;

  sections[clamped].scrollIntoView({
    behavior:"smooth",
    block:"start"
  });

  setTimeout(()=>{
    isScrolling=false;
  },scrollLockMs);
}

window.addEventListener("wheel",e=>{
  if(letterOpen) return;

  e.preventDefault();
  if(isScrolling) return;

  if(e.deltaY>10&&currentSectionIndex<sections.length-1){
    goToSection(currentSectionIndex+1);
  }else if(e.deltaY<-10&&currentSectionIndex>0){
    goToSection(currentSectionIndex-1);
  }
},{passive:false});

window.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&letterOpen){
    e.preventDefault();
    closeLetter();
    return;
  }

  if(letterOpen||isScrolling) return;

  if(e.key==="ArrowDown"||e.key==="PageDown"||e.key===" "){
    e.preventDefault();
    if(currentSectionIndex<sections.length-1){
      goToSection(currentSectionIndex+1);
    }
  }

  if(e.key==="ArrowUp"||e.key==="PageUp"){
    e.preventDefault();
    if(currentSectionIndex>0){
      goToSection(currentSectionIndex-1);
    }
  }

  if(e.key==="Home"){
    e.preventDefault();
    goToSection(0);
  }

  if(e.key==="End"){
    e.preventDefault();
    goToSection(sections.length-1);
  }
});

window.addEventListener("touchstart",e=>{
  touchStartY=e.changedTouches[0].clientY;
},{passive:true});

window.addEventListener("touchend",e=>{
  if(letterOpen||isScrolling) return;

  const touchEndY=e.changedTouches[0].clientY;
  const diff=touchStartY-touchEndY;

  if(Math.abs(diff)<50) return;

  if(diff>0&&currentSectionIndex<sections.length-1){
    goToSection(currentSectionIndex+1);
  }else if(diff<0&&currentSectionIndex>0){
    goToSection(currentSectionIndex-1);
  }
},{passive:true});

window.addEventListener("scroll",()=>{
  if(isScrolling||letterOpen) return;

  let bestIndex=0;
  let bestDistance=Infinity;

  sections.forEach((section,index)=>{
    const distance=Math.abs(section.getBoundingClientRect().top);
    if(distance<bestDistance){
      bestDistance=distance;
      bestIndex=index;
    }
  });

  currentSectionIndex=bestIndex;
},{passive:true});

// ---------- BELLY RUB ----------
function checkRub(x,y){
  if(letterOpen) return;
  if(!document.body.classList.contains("final-cursor")) return;

  const r=dog.getBoundingClientRect();

  if(x<r.left||x>r.right||y<r.top||y>r.bottom) return;

  const relX=(x-r.left)/r.width;
  const relY=(y-r.top)/r.height;

  const inBelly=
    relX>0.28&&relX<0.72&&
    relY>0.40&&relY<0.84;

  if(!inBelly) return;

  rub++;
  if(rub>40&&!letterOpen){
    openLetter();
  }
}

window.addEventListener("mousemove",e=>{
  checkRub(e.clientX,e.clientY);
});

window.addEventListener("touchmove",e=>{
  const t=e.touches[0];
  if(t) checkRub(t.clientX,t.clientY);
},{passive:true});

// ---------- LETTER OPEN/CLOSE ----------
function openLetter(){
  letterOpen=true;
  audio.pause();
  audio.currentTime=0;
  playing=false;
  overlay.classList.add("open");
}

function closeLetter(){
  overlay.classList.remove("open");
  letterOpen=false;
  rub=0;

  if(final.classList.contains("active")){
    audio.currentTime = 0;
    const p = audio.play();
    if(p) p.catch(()=>{});
    playing=true;
  }
}

close.addEventListener("click",closeLetter);

overlay.addEventListener("click",e=>{
  if(e.target===overlay){
    closeLetter();
  }
});
</script>

</body>
</html>
