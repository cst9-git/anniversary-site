<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love Gaya ❤️</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
}

.version-tag{
  position:fixed;
  top:8px;
  left:10px;
  font-size:10px;
  color:rgba(255,255,255,0.35);
  z-index:9999;
}

body.final-cursor,
body.final-cursor *{
  cursor:url("sponge.png") 16 16, auto;
}

.section{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  opacity:0;
  transition:opacity 1.2s ease;
}

.section.active{opacity:1}

.media-grid{
  width:100%;
  max-width:1500px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:22px;
}

.media-card{
  width:100%;
  height:78vh;
  background:#111;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 24px rgba(255,255,255,0.14);
  display:flex;
  align-items:center;
  justify-content:center;
}

.media-card img,
.media-card video{
  width:100%;
  height:100%;
  object-fit:contain;
}

.final-section{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#cfc4ff;
}

.final-dog{
  max-width:90%;
  max-height:80vh;
  user-select:none;
}

.letter-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  visibility:hidden;
  transition:0.4s;
  z-index:10000;
}

.letter-overlay.open{
  opacity:1;
  visibility:visible;
}

.letter-image{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.letter-close{
  position:absolute;
  top:20px;
  right:20px;
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#fff;
  color:#000;
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="version-tag">v1.2.1</div>
<audio id="belly-audio" src="belly.mp3"></audio>

<script>
// ---------- MEDIA SETUP ----------
const portraitPhotos=[...Array(36)].map((_,i)=>"pp"+(i+1));
const landscapePhotos=[...Array(23)].map((_,i)=>"lp"+(i+1));
const portraitVideos=[...Array(19)].map((_,i)=>"pv"+(i+1));
const landscapeVideos=["lv1","lv2","lv3","lv4","lv5"];

const imageExts=[".jpg",".jpeg",".JPG",".JPEG"];
const videoExts=[".mp4",".MP4",".mov",".MOV"];

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function loadImage(img,base){
  let i=0;
  function next(){
    if(i>=imageExts.length)return;
    img.src=base+imageExts[i++];
  }
  img.onerror=next;
  next();
}

function setupVideo(v,base){
  let i=0;
  function next(){
    if(i>=videoExts.length)return;
    v.src=base+videoExts[i++];
  }
  v.onerror=next;
  next();
}

const photos=shuffle([...portraitPhotos,...landscapePhotos].map(x=>({t:"i",b:x})));
const videos=shuffle([...portraitVideos,...landscapeVideos].map(x=>({t:"v",b:x})));

function build(){
  const out=[]; let p=0,v=0;
  while(p<photos.length||v<videos.length){
    const s=[];
    if(v<videos.length)s.push(videos[v++]);
    while(s.length<3&&p<photos.length)s.push(photos[p++]);
    out.push(shuffle(s));
  }
  return out;
}

build().forEach(g=>{
  const sec=document.createElement("section");
  sec.className="section";

  const grid=document.createElement("div");
  grid.className="media-grid";

  g.forEach(it=>{
    const card=document.createElement("div");
    card.className="media-card";

    if(it.t==="i"){
      const img=document.createElement("img");
      loadImage(img,it.b);
      card.appendChild(img);
    }else{
      const v=document.createElement("video");
      v.muted=true; v.loop=true; v.controls=true;
      setupVideo(v,it.b);
      card.appendChild(v);
    }

    grid.appendChild(card);
  });

  sec.appendChild(grid);
  document.body.appendChild(sec);
});

// ---------- FINAL SECTION ----------
const final=document.createElement("section");
final.className="final-section";

const dog=document.createElement("img");
dog.src="pibble.png";
dog.className="final-dog";

final.appendChild(dog);
document.body.appendChild(final);

// ---------- LETTER ----------
const overlay=document.createElement("div");
overlay.className="letter-overlay";

const letter=document.createElement("img");
letter.src="letter.jpg";
letter.className="letter-image";

const close=document.createElement("button");
close.className="letter-close";
close.innerHTML="&times;";

overlay.appendChild(letter);
overlay.appendChild(close);
document.body.appendChild(overlay);

// ---------- AUDIO ----------
const audio=document.getElementById("belly-audio");
let playing=false;

// ---------- OBSERVER ----------
const sections=[...document.querySelectorAll("section")];

const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("active");

      if(e.target===final){
        document.body.classList.add("final-cursor");

        if(!playing){
          playing=true;
          audio.currentTime=0;
          audio.play().catch(()=>{});
        }
      }
    }else{
      e.target.classList.remove("active");

      if(e.target===final){
        document.body.classList.remove("final-cursor");
        audio.pause();
        playing=false;
      }
    }
  });
},{threshold:0.7});

sections.forEach(s=>obs.observe(s));

// ---------- RUB DETECTION ----------
let rub=0;
function checkRub(x,y){
  const r=dog.getBoundingClientRect();

  if(x>r.left && x<r.right && y>r.top && y<r.bottom){
    rub++;
    if(rub>40 && !overlay.classList.contains("open")){
      audio.pause();
      overlay.classList.add("open");
    }
  }
}

window.addEventListener("mousemove",e=>{
  if(document.body.classList.contains("final-cursor")){
    checkRub(e.clientX,e.clientY);
  }
});

window.addEventListener("touchmove",e=>{
  const t=e.touches[0];
  if(t) checkRub(t.clientX,t.clientY);
});

// ---------- CLOSE LETTER ----------
function closeLetter(){
  overlay.classList.remove("open");
  rub=0;

  if(final.classList.contains("active")){
    audio.play().catch(()=>{});
  }
}

close.onclick=closeLetter;

overlay.onclick=(e)=>{
  if(e.target===overlay) closeLetter();
};

window.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeLetter();
});
</script>

</body>
</html>
