<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love Gaya ❤️</title>
<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
}

.version-tag{
  position:fixed;
  top:8px;
  left:10px;
  font-size:10px;
  color:rgba(255,255,255,0.35);
  z-index:9999;
  user-select:none;
  pointer-events:none;
}

body.final-cursor,
body.final-cursor *{
  cursor:url("sponge.png") 16 16, auto;
}

.section{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  opacity:0;
  transition:opacity 1.2s ease;
}

.section.active{opacity:1}

.media-grid{
  width:100%;
  max-width:1500px;
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:22px;
}

.media-card{
  width:100%;
  height:78vh;
  background:#111;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 24px rgba(255,255,255,0.14);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.media-card img,
.media-card video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#111;
}

.error{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  color:#ff8f8f;
  background:rgba(0,0,0,0.88);
  font-size:14px;
}

.media-card.failed .error{
  display:flex;
}

.final-section{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  opacity:0;
  transition:opacity 1.2s ease;
  background:#cfc4ff;
  position:relative;
}

.final-section.active{
  opacity:1;
}

.final-wrap{
  width:100%;
  max-width:900px;
  height:80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.final-dog{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
  touch-action:none;
}

.rub-hint{
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  font-size:14px;
  color:rgba(0,0,0,0.55);
  pointer-events:none;
  text-align:center;
}

.letter-overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.45);
  opacity:0;
  visibility:hidden;
  transition:opacity 0.5s ease, visibility 0.5s ease;
  z-index:10000;
}

.letter-overlay.open{
  opacity:1;
  visibility:visible;
}

.letter-image{
  max-width:min(90vw, 950px);
  max-height:90vh;
  object-fit:contain;
  display:block;
  border-radius:18px;
  box-shadow:0 18px 50px rgba(0,0,0,0.35);
  background:#fff;
}

@media (max-width:950px){
  .media-grid{grid-template-columns:1fr}
  .media-card{height:78vh}
  .rub-hint{font-size:13px}
}
</style>
</head>
<body>

<div class="version-tag">v1.2.0</div>
<audio id="belly-audio" src="belly.mp3" preload="auto"></audio>

<script>
const portraitPhotos = [
  "pp1","pp2","pp3","pp4","pp5","pp6","pp7","pp8","pp9","pp10",
  "pp11","pp12","pp13","pp14","pp15","pp16","pp17","pp18","pp19","pp20",
  "pp21","pp22","pp23","pp24","pp25","pp26","pp27","pp28","pp29","pp30",
  "pp31","pp32","pp33","pp34","pp35","pp36"
];

const landscapePhotos = [
  "lp1","lp2","lp3","lp4","lp5","lp6","lp7","lp8","lp9","lp10","lp11",
  "lp12","lp13","lp14","lp15","lp16","lp17","lp18","lp19","lp20","lp21","lp22","lp23"
];

const portraitVideos = [
  "pv1","pv2","pv3","pv4","pv5","pv6","pv7","pv8","pv9","pv10",
  "pv11","pv12","pv13","pv14","pv15","pv16","pv17","pv18","pv19"
];

const landscapeVideos = ["lv1","lv2","lv3","lv4","lv5"];

const imageExts = [".jpg",".jpeg",".JPG",".JPEG"];
const videoExts = [".mp4",".MP4",".mov",".MOV"];

function shuffle(array){
  const arr = [...array];
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function loadImage(img, base){
  let i = 0;
  function next(){
    if(i >= imageExts.length){
      img.style.display = "none";
      return;
    }
    img.src = base + imageExts[i++];
  }
  img.onerror = next;
  next();
}

function setupVideo(video, card, base){
  let i = 0;
  let working = false;

  function next(){
    if(i >= videoExts.length){
      card.classList.add("failed");
      return;
    }
    const src = base + videoExts[i++];
    video.src = src;
    video.load();
  }

  video.addEventListener("loadeddata", () => {
    working = true;
    card.classList.remove("failed");
  });

  video.addEventListener("error", () => {
    if(!working) next();
  });

  next();
}

const photos = shuffle([
  ...portraitPhotos.map(x => ({type:"image", base:x})),
  ...landscapePhotos.map(x => ({type:"image", base:x}))
]);

const videos = shuffle([
  ...portraitVideos.map(x => ({type:"video", base:x})),
  ...landscapeVideos.map(x => ({type:"video", base:x}))
]);

function buildMixedSections(photos, videos){
  const sections = [];
  let photoIndex = 0;
  let videoIndex = 0;

  while(photoIndex < photos.length || videoIndex < videos.length){
    const section = [];

    if(videoIndex < videos.length){
      section.push(videos[videoIndex++]);
    }

    while(section.length < 3 && photoIndex < photos.length){
      section.push(photos[photoIndex++]);
    }

    while(section.length < 3 && videoIndex < videos.length && !section.some(item => item.type === "video")){
      section.push(videos[videoIndex++]);
    }

    while(section.length < 3 && photoIndex < photos.length){
      section.push(photos[photoIndex++]);
    }

    while(section.length < 3 && videoIndex < videos.length){
      section.push(videos[videoIndex++]);
    }

    sections.push(shuffle(section));
  }

  return sections;
}

const groups = buildMixedSections(photos, videos);
const body = document.body;
const audio = document.getElementById("belly-audio");

let userHasInteracted = false;
let bellyStarted = false;
let letterOpened = false;

function unlockAudio(){
  userHasInteracted = true;
}

window.addEventListener("click", unlockAudio, { once:true });
window.addEventListener("touchstart", unlockAudio, { once:true });
window.addEventListener("keydown", unlockAudio, { once:true });
window.addEventListener("wheel", unlockAudio, { once:true });

groups.forEach(group => {
  const section = document.createElement("section");
  section.className = "section";

  const grid = document.createElement("div");
  grid.className = "media-grid";

  group.forEach(item => {
    const card = document.createElement("div");
    card.className = "media-card";

    if(item.type === "image"){
      const img = document.createElement("img");
      img.alt = item.base;
      loadImage(img, item.base);
      card.appendChild(img);
    } else {
      const video = document.createElement("video");
      video.muted = true;
      video.loop = true;
      video.autoplay = false;
      video.playsInline = true;
      video.controls = true;
      video.preload = "metadata";

      const error = document.createElement("div");
      error.className = "error";
      error.textContent = item.base + " could not be decoded by this browser.";

      setupVideo(video, card, item.base);

      card.appendChild(video);
      card.appendChild(error);
    }

    grid.appendChild(card);
  });

  section.appendChild(grid);
  body.appendChild(section);
});

const finalSection = document.createElement("section");
finalSection.className = "final-section";

const finalWrap = document.createElement("div");
finalWrap.className = "final-wrap";

const finalDog = document.createElement("img");
finalDog.className = "final-dog";
finalDog.src = "pibble.png";
finalDog.alt = "pibble";

const rubHint = document.createElement("div");
rubHint.className = "rub-hint";
rubHint.textContent = "Rub the belly";

finalWrap.appendChild(finalDog);
finalWrap.appendChild(rubHint);
finalSection.appendChild(finalWrap);
body.appendChild(finalSection);

const letterOverlay = document.createElement("div");
letterOverlay.className = "letter-overlay";

const letterImg = document.createElement("img");
letterImg.className = "letter-image";
letterImg.src = "letter.jpg";
letterImg.alt = "letter";

letterOverlay.appendChild(letterImg);
body.appendChild(letterOverlay);

const sections = Array.from(document.querySelectorAll(".section, .final-section"));

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const videos = entry.target.querySelectorAll("video");

    if(entry.isIntersecting){
      entry.target.classList.add("active");

      videos.forEach(v => {
        const p = v.play();
        if(p) p.catch(() => {});
      });

      if(entry.target.classList.contains("final-section")){
        document.body.classList.add("final-cursor");

        if(userHasInteracted && !bellyStarted && !letterOpened){
          bellyStarted = true;
          audio.currentTime = 0;
          const p = audio.play();
          if(p) p.catch(() => {});
        }
      } else {
        document.body.classList.remove("final-cursor");
      }
    } else {
      entry.target.classList.remove("active");

      videos.forEach(v => {
        v.pause();
        v.currentTime = 0;
      });

      if(entry.target.classList.contains("final-section")){
        document.body.classList.remove("final-cursor");
        audio.pause();
        audio.currentTime = 0;
        bellyStarted = false;
      }
    }
  });
}, { threshold:0.7 });

sections.forEach(s => observer.observe(s));

let currentSectionIndex = 0;
let isScrolling = false;
let touchStartY = 0;
const scrollLockMs = 900;

function goToSection(index){
  const clamped = Math.max(0, Math.min(index, sections.length - 1));
  currentSectionIndex = clamped;
  isScrolling = true;

  sections[clamped].scrollIntoView({
    behavior:"smooth",
    block:"start"
  });

  setTimeout(() => {
    isScrolling = false;
  }, scrollLockMs);
}

window.addEventListener("wheel", (e) => {
  if(letterOpened) return;

  e.preventDefault();

  if(isScrolling) return;

  if(e.deltaY > 10 && currentSectionIndex < sections.length - 1){
    goToSection(currentSectionIndex + 1);
  } else if(e.deltaY < -10 && currentSectionIndex > 0){
    goToSection(currentSectionIndex - 1);
  }
}, { passive:false });

window.addEventListener("keydown", (e) => {
  if(letterOpened) return;
  if(isScrolling) return;

  if((e.key === "ArrowDown" || e.key === "PageDown" || e.key === " ")) {
    e.preventDefault();
    if(currentSectionIndex < sections.length - 1){
      goToSection(currentSectionIndex + 1);
    }
  }

  if(e.key === "ArrowUp" || e.key === "PageUp"){
    e.preventDefault();
    if(currentSectionIndex > 0){
      goToSection(currentSectionIndex - 1);
    }
  }

  if(e.key === "Home"){
    e.preventDefault();
    goToSection(0);
  }

  if(e.key === "End"){
    e.preventDefault();
    goToSection(sections.length - 1);
  }
});

window.addEventListener("touchstart", (e) => {
  touchStartY = e.changedTouches[0].clientY;
}, { passive:true });

window.addEventListener("touchend", (e) => {
  if(letterOpened) return;
  if(isScrolling) return;

  const touchEndY = e.changedTouches[0].clientY;
  const diff = touchStartY - touchEndY;

  if(Math.abs(diff) < 50) return;

  if(diff > 0 && currentSectionIndex < sections.length - 1){
    goToSection(currentSectionIndex + 1);
  } else if(diff < 0 && currentSectionIndex > 0){
    goToSection(currentSectionIndex - 1);
  }
}, { passive:true });

window.addEventListener("scroll", () => {
  if(isScrolling || letterOpened) return;

  let bestIndex = 0;
  let bestDistance = Infinity;

  sections.forEach((section, index) => {
    const distance = Math.abs(section.getBoundingClientRect().top);
    if(distance < bestDistance){
      bestDistance = distance;
      bestIndex = index;
    }
  });

  currentSectionIndex = bestIndex;
}, { passive:true });

let rubProgress = 0;
const rubTarget = 45;
let lastRubX = null;
let lastRubY = null;
let lastRubTime = 0;

function openLetter(){
  if(letterOpened) return;
  letterOpened = true;

  audio.pause();
  audio.currentTime = 0;
  bellyStarted = false;

  rubHint.textContent = "";
  letterOverlay.classList.add("open");
}

function processRub(clientX, clientY){
  if(letterOpened) return;
  if(!finalSection.classList.contains("active")) return;

  const rect = finalDog.getBoundingClientRect();

  if(clientX < rect.left || clientX > rect.right || clientY < rect.top || clientY > rect.bottom){
    lastRubX = null;
    lastRubY = null;
    return;
  }

  const x = (clientX - rect.left) / rect.width;
  const y = (clientY - rect.top) / rect.height;

  const inBelly =
    x > 0.28 && x < 0.72 &&
    y > 0.40 && y < 0.82;

  if(!inBelly){
    lastRubX = null;
    lastRubY = null;
    return;
  }

  const now = Date.now();

  if(lastRubX !== null && lastRubY !== null){
    const dx = clientX - lastRubX;
    const dy = clientY - lastRubY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist > 3 && now - lastRubTime < 250){
      rubProgress += 1;
      if(rubProgress >= rubTarget){
        openLetter();
      }
    }
  }

  lastRubX = clientX;
  lastRubY = clientY;
  lastRubTime = now;
}

window.addEventListener("mousemove", (e) => {
  if(document.body.classList.contains("final-cursor")){
    processRub(e.clientX, e.clientY);
  }
});

window.addEventListener("touchmove", (e) => {
  if(!document.body.classList.contains("final-cursor")) return;
  const touch = e.touches[0];
  if(touch){
    processRub(touch.clientX, touch.clientY);
  }
}, { passive:true });
</script>

</body>
</html>
